name: Build and Release PhotoPaint

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Compile and Package PhotoPaint
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Compile PhotoPaint
        shell: cmd
        run: |
          call "Support\CI\build.bat" "%CD%"

      - name: Prepare Release Package
        shell: powershell
        run: |
          $build_dir = "build_dist"
          New-Item -ItemType Directory -Force -Path $build_dir
          
          # Copy executable and essential auxiliary files
          Copy-Item -Path "PhotoPaint.exe" -Destination $build_dir/
          Copy-Item -Path "AUTHORS.md" -Destination $build_dir/ -ErrorAction SilentlyContinue
          Copy-Item -Path "INSTALL.md" -Destination $build_dir/ -ErrorAction SilentlyContinue
          Copy-Item -Path "LICENSE.md" -Destination $build_dir/ -ErrorAction SilentlyContinue
          Copy-Item -Path "README.md" -Destination $build_dir/ -ErrorAction SilentlyContinue
          Copy-Item -Path "Gimp.ico" -Destination $build_dir/ -ErrorAction SilentlyContinue
          
          # Copy App folder (contains plugins, themes, languages, etc.)
          Copy-Item -Path "App" -Destination $build_dir/ -Recurse -Force
          
          # Package as ZIP
          Compress-Archive -Path "$build_dir\*" -DestinationPath "PhotoPaint-portable.zip" -Force
          Write-Host "Created PhotoPaint-portable.zip successfully!"
          
          # Compile Inno Setup Installer if compiler is present
          $iscc_path = $null
          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if ($iscc) {
              $iscc_path = $iscc.Source
          } elseif (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe") {
              $iscc_path = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          
          if ($iscc_path) {
              Write-Host "Inno Setup Compiler found at: $iscc_path. Compiling installer..."
              & $iscc_path installer.iss
          } else {
              Write-Host "Inno Setup Compiler not found. Skipping installer compilation."
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhotoPaint-build
          path: |
            PhotoPaint-portable.zip
            PhotoPaint-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PhotoPaint-portable.zip
            PhotoPaint-Setup.exe
          name: PhotoPaint ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
