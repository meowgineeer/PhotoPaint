trigger:
  - main

# PRs are not currently built (https://docs.microsoft.com/en-us/azure/devops/pipelines/build/triggers?view=azure-devops&tabs=yaml)
pr: none

pool: Default

steps:
  - script: 'call "$(Build.SourcesDirectory)\Support\CI\build.bat" "$(Build.SourcesDirectory)"'
    displayName: 'Build PhotoPaint.vbp'
    workingDirectory:  '$(Build.SourcesDirectory)\Support\CI'
    failOnStderr: true
  
  - task: CopyFiles@2
    displayName: 'Copy PhotoPaint.exe to $(Build.BinariesDirectory)'
    inputs:
      sourceFolder: '$(Build.SourcesDirectory)'
      contents: |
        Donate to PhotoPaint.url
        AUTHORS.md
        INSTALL.md
        LICENSE.md
        README.md
        PhotoPaint.exe
      targetFolder: '$(Build.BinariesDirectory)'
      cleanTargetFolder: true
      
  - task: CopyFiles@2
    displayName: 'Copy App folder to $(Build.BinariesDirectory)\App'
    inputs:
      sourceFolder: '$(Build.SourcesDirectory)\App'
      contents: '**'
      targetFolder: '$(Build.BinariesDirectory)\App'
  
  - task: ArchiveFiles@2
    displayName: 'Archive $(Build.BinariesDirectory)'
    inputs:
      rootFolderOrFile: '$(Build.BinariesDirectory)'
      archiveFile: '$(Build.ArtifactStagingDirectory)/PhotoPaint-nightly.zip' 
      includeRootFolder: false
      replaceExistingArchive: true
  
  - task: PublishBuildArtifacts@1
    displayName: 'Publish artifact PhotoPaint'
    inputs:
      pathToPublish: '$(Build.BinariesDirectory)'
      artifactName: 'PhotoPaint'
      parallel: true

  - task: GithubRelease@1
    displayName: 'Remove release `PhotoPaint-nightly` on github.com'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/pull')))
    continueOnError: true
    inputs:
      githubConnection: 'GitHub'
      repositoryName: 'tannerhelland/PhotoPaint'
      action: 'delete'
      tag: 'PhotoPaint-nightly'
  
  - task: GithubRelease@1
    displayName: 'Create release `PhotoPaint-nightly` on github.com'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/pull')))
    inputs:
      gitHubConnection: 'GitHub'
      repositoryName: 'tannerhelland/PhotoPaint'
      action: 'create'
      tagSource: 'userSpecifiedTag'
      tag: 'PhotoPaint-nightly'
      title: 'PhotoPaint nightly build'
      assets: $(Build.ArtifactStagingDirectory)/*
      assetUploadMode: 'delete'
      isPreRelease: true
      releaseNotesSource: 'inline'
      releaseNotesInline: 'This release was automatically built from PhotoPaint''s current source code.  It may contain serious bugs.  Use at your own risk.'
      addChangeLog: true
      changeLogType: 'commitBased'
      changeLogCompareToRelease: 'lastFullRelease'
